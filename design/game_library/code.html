<script>
        // Simple interactive handling for 'controller' navigation feel
        document.addEventListener('keydown', (e) => {
            const sounds = {
                move: 'https://www.soundjay.com/buttons/sounds/button-16.mp3',
                select: 'https://www.soundjay.com/buttons/sounds/button-3.mp3'
            };

            const playSound = (src) => {
                const audio = new Audio(src);
                audio.volume = 0.2;
                audio.play().catch(() => {}); // Catch browser auto-play block
            };

            if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
                playSound(sounds.move);
                // In a real app, logic to shift focus would go here
            }
            if (e.key === 'Enter') {
                playSound(sounds.select);
            }
        });

        // Atmosphere: Subtle movement on mouse move
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) - 0.5;
            const y = (e.clientY / window.innerHeight) - 0.5;
            
            const shaderContainer = document.querySelector('webgl-shader');
            if (shaderContainer) {
                shaderContainer.style.transform = `translate(${x * 20}px, ${y * 20}px)`;
            }
        });
    </script>
